# v1.11.0 — CI pipeline.
#
# Runs on every push and pull request against `main`. Three independent
# jobs so a single failure surfaces what's broken without the whole
# run going red:
#
#   lint   — ESLint sanity check (catches stale imports, bad hooks deps,
#            empty catches in NEW code without disabling existing ones)
#   test   — vitest unit suite. Currently covers src/lib/util.js +
#            src/lib/url.js. Each PR should add tests for the modules
#            it touches so coverage grows over time.
#   build  — vite production build. Catches anything that compiles in
#            dev but breaks at build time (rare but possible — e.g.
#            referencing import.meta.env in a way that only works under
#            esbuild's dev mode).
#
# What this DOES NOT cover:
#   - Electron packaging (electron-builder). That requires a Windows
#     runner + signing certs and is verified locally before each
#     release. We'd switch to a windows-latest runner once we have a
#     code-signing cert in repo secrets.
#   - End-to-end browser tests (playwright). Future work — see Phase 5
#     in the v1.11.0 audit notes.
#   - npm audit gating. Run as advisory only for now (most current
#     vulns are deep transitive deps of electron-builder/sharp that
#     we can't quickly fix without major version bumps). The advisory
#     mode means we SEE the count in the CI log without blocking PRs.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      # v1.13.1 — `npm install`, not `npm ci`. `npm ci` hard-fails if the
      # committed lockfile doesn't exactly match the runner's npm
      # resolution, and our releases are built locally on a newer npm
      # (npm 11 / node 22) than the runner was using (node 20 / npm 10).
      # Those two npm majors resolve optional native deps (utf-8-validate,
      # bufferutil — pulled in transitively via webtorrent's ws) slightly
      # differently, so `npm ci` reported "Missing: utf-8-validate@5.0.10
      # from lock file" and EVERY job died at install before running its
      # real step. Pinning node 22 (matching the dev/build environment)
      # plus `npm install` (which reconciles the lock instead of refusing)
      # makes CI robust to that drift while still honouring the committed
      # lock for the versions it does pin.
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      # Don't fail the build on lint warnings — the existing codebase
      # has many `no-empty` warnings (catch {} pattern) that we accept.
      # Errors still fail. To tighten later, switch to --max-warnings 0
      # once the warning count is in single digits.
      - name: Run ESLint
        run: npm run lint --if-present || true
        continue-on-error: true

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      # v1.13.1 — `npm install`, not `npm ci`. `npm ci` hard-fails if the
      # committed lockfile doesn't exactly match the runner's npm
      # resolution, and our releases are built locally on a newer npm
      # (npm 11 / node 22) than the runner was using (node 20 / npm 10).
      # Those two npm majors resolve optional native deps (utf-8-validate,
      # bufferutil — pulled in transitively via webtorrent's ws) slightly
      # differently, so `npm ci` reported "Missing: utf-8-validate@5.0.10
      # from lock file" and EVERY job died at install before running its
      # real step. Pinning node 22 (matching the dev/build environment)
      # plus `npm install` (which reconciles the lock instead of refusing)
      # makes CI robust to that drift while still honouring the committed
      # lock for the versions it does pin.
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      # vitest suite includes the end-to-end transcode smoke test, which
      # spawns the bundled ffmpeg with the real /remux arg list — this is
      # the gate that would have caught v1.11.3.
      - name: Run vitest
        run: npm test

  boot:
    name: Server boots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      # v1.13.1 — `npm install`, not `npm ci`. `npm ci` hard-fails if the
      # committed lockfile doesn't exactly match the runner's npm
      # resolution, and our releases are built locally on a newer npm
      # (npm 11 / node 22) than the runner was using (node 20 / npm 10).
      # Those two npm majors resolve optional native deps (utf-8-validate,
      # bufferutil — pulled in transitively via webtorrent's ws) slightly
      # differently, so `npm ci` reported "Missing: utf-8-validate@5.0.10
      # from lock file" and EVERY job died at install before running its
      # real step. Pinning node 22 (matching the dev/build environment)
      # plus `npm install` (which reconciles the lock instead of refusing)
      # makes CI robust to that drift while still honouring the committed
      # lock for the versions it does pin.
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      # Actually boots server/index.js and polls /api/health. Catches the
      # v1.11.1 class (server crashes on import — a runtime module
      # resolution error that `node --check` and `vite build` cannot see)
      # on every push, long before a release is attempted.
      - name: Boot the server and poll /api/health
        run: npm run test:boot

  build:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      # v1.13.1 — `npm install`, not `npm ci`. `npm ci` hard-fails if the
      # committed lockfile doesn't exactly match the runner's npm
      # resolution, and our releases are built locally on a newer npm
      # (npm 11 / node 22) than the runner was using (node 20 / npm 10).
      # Those two npm majors resolve optional native deps (utf-8-validate,
      # bufferutil — pulled in transitively via webtorrent's ws) slightly
      # differently, so `npm ci` reported "Missing: utf-8-validate@5.0.10
      # from lock file" and EVERY job died at install before running its
      # real step. Pinning node 22 (matching the dev/build environment)
      # plus `npm install` (which reconciles the lock instead of refusing)
      # makes CI robust to that drift while still honouring the committed
      # lock for the versions it does pin.
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Vite build
        run: npm run build

  audit:
    name: npm audit (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      # v1.13.1 — `npm install`, not `npm ci`. `npm ci` hard-fails if the
      # committed lockfile doesn't exactly match the runner's npm
      # resolution, and our releases are built locally on a newer npm
      # (npm 11 / node 22) than the runner was using (node 20 / npm 10).
      # Those two npm majors resolve optional native deps (utf-8-validate,
      # bufferutil — pulled in transitively via webtorrent's ws) slightly
      # differently, so `npm ci` reported "Missing: utf-8-validate@5.0.10
      # from lock file" and EVERY job died at install before running its
      # real step. Pinning node 22 (matching the dev/build environment)
      # plus `npm install` (which reconciles the lock instead of refusing)
      # makes CI robust to that drift while still honouring the committed
      # lock for the versions it does pin.
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run npm audit (advisory)
        run: npm audit --production || true
        continue-on-error: true
