<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>WardoFlix — Premium Streaming</title>

    <!-- PWA — "Add to Home Screen" on iPad/iPhone turns this into a fullscreen app -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#0b0d12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WardoFlix" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="./icon-512.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <!-- Chromecast SDK: loaded dynamically from main.jsx, but only over
         http(s). Under file:// (packaged Electron) its protocol-relative
         internal URLs break and spam the console; DLNA handles casting
         in that environment. -->
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
