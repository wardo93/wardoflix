<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>WardoFlix — Owner Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin defer></script>
<style>
  :root {
    color-scheme: dark;
    --bg: #0b0d12;
    --panel: #151821;
    --border: rgba(255,255,255,0.06);
    --text: #ecefe4;
    --muted: #8fa3b8;
    --accent: #c9a96e;
    --ok: #6ecf7b;
    --warn: #f5c15e;
    --cold: #6b7078;
    --danger: #e35f5f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: system-ui, "Segoe UI", Arial, sans-serif; }
  #app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
  aside {
    background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; min-height: 0;
  }
  header {
    padding: 18px 20px; border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0; font-size: 20px; color: var(--accent); font-weight: 600; }
  header .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .stat { background: rgba(255,255,255,0.03); border-radius: 6px; padding: 10px; }
  .stat .num { font-size: 22px; font-weight: 600; color: var(--text); }
  .stat .lbl { color: var(--muted); font-size: 11px; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
  .filters { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .filters label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  .filters input[type=search] {
    width: 100%; background: #0f1218; border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 4px; font-size: 13px; font-family: inherit;
  }
  .list {
    flex: 1; overflow-y: auto; padding: 8px 0;
  }
  .row {
    padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer;
    transition: background 0.1s;
  }
  .row:hover { background: rgba(255,255,255,0.03); }
  .row.active { background: rgba(201,169,110,0.08); border-left: 2px solid var(--accent); padding-left: 14px; }
  .row .id { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11px; color: var(--muted); word-break: break-all; }
  .row .meta { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 6px 12px; font-size: 12px; color: var(--text); }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .dot.ok { background: var(--ok); }
  .dot.warn { background: var(--warn); }
  .dot.cold { background: var(--cold); }
  footer {
    padding: 10px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted);
    display: flex; justify-content: space-between; align-items: center;
  }
  footer button {
    background: transparent; border: 1px solid var(--border); color: var(--text);
    padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  #map { height: 100vh; }
  .popup { font-family: inherit; color: #111; }
  .popup .id-line { font-family: ui-monospace, monospace; font-size: 11px; word-break: break-all; }
  .popup .revoke {
    margin-top: 10px; background: var(--danger); color: white; border: none;
    padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  .error-banner {
    position: fixed; top: 12px; right: 12px; background: var(--danger); color: white;
    padding: 12px 18px; border-radius: 6px; font-size: 13px; box-shadow: 0 4px 18px rgba(0,0,0,0.4);
    max-width: 420px; z-index: 9999;
  }
</style>
</head>
<body>
<div id="app">
  <aside>
    <header>
      <h1>WardoFlix · Installs</h1>
      <div class="sub">Live installs · geo via Cloudflare edge</div>
    </header>
    <div class="stats">
      <div class="stat"><div class="num" id="stat-total">—</div><div class="lbl">Total</div></div>
      <div class="stat"><div class="num" id="stat-active">—</div><div class="lbl">Active (24h)</div></div>
      <div class="stat"><div class="num" id="stat-launches">—</div><div class="lbl">Launches</div></div>
      <div class="stat"><div class="num" id="stat-countries">—</div><div class="lbl">Countries</div></div>
    </div>
    <div class="filters">
      <label>Search by ID / city / country</label>
      <input type="search" id="q" placeholder="Type to filter…" autocomplete="off" />
    </div>
    <div class="list" id="list"></div>
    <footer>
      <span id="updated">Loading…</span>
      <button id="refresh" type="button">↻ Refresh</button>
    </footer>
  </aside>
  <div id="map"></div>
</div>

<script>
  // ─── CONFIGURE THESE TWO BEFORE USING ────────────────────────────
  const WORKER_URL = 'https://wardoflix-telemetry.wardgeys93.workers.dev/'
  const DASHBOARD_KEY = '5f477b6971314fabb45f57f498c79d5c95bc0b1b267503579648f853476b5860'
  // ─────────────────────────────────────────────────────────────────

  const HOUR = 60 * 60 * 1000
  const DAY = 24 * HOUR

  let map, markerLayer, records = [], filtered = [], selectedId = null

  function bucketFor(lastSeen) {
    const age = Date.now() - lastSeen
    if (age < HOUR) return 'ok'
    if (age < DAY) return 'warn'
    return 'cold'
  }

  function fmtRelative(ts) {
    if (!ts) return '—'
    const diff = Date.now() - ts
    if (diff < 60_000) return 'just now'
    if (diff < HOUR) return Math.floor(diff / 60_000) + ' min ago'
    if (diff < DAY) return Math.floor(diff / HOUR) + ' h ago'
    if (diff < 7 * DAY) return Math.floor(diff / DAY) + ' d ago'
    return new Date(ts).toLocaleDateString()
  }

  function showError(msg) {
    const existing = document.querySelector('.error-banner')
    if (existing) existing.remove()
    const el = document.createElement('div')
    el.className = 'error-banner'
    el.textContent = msg
    document.body.appendChild(el)
    setTimeout(() => el.remove(), 6000)
  }

  // Strip any trailing slash so we don't end up with "...workers.dev//list",
  // which Cloudflare routes as pathname "//list" and our Worker doesn't
  // match (routes check exact "/list"). Forgiving whether the user pasted
  // the URL with or without the trailing slash.
  const WORKER_BASE = WORKER_URL.replace(/\/+$/, '')

  async function fetchRecords() {
    document.getElementById('refresh').disabled = true
    try {
      const r = await fetch(WORKER_BASE + '/list', {
        headers: { 'x-dashboard-key': DASHBOARD_KEY },
      })
      if (!r.ok) {
        const msg = r.status === 401
          ? 'Dashboard key rejected. Check DASHBOARD_KEY in this file vs the Worker secret.'
          : `Worker returned ${r.status}. Check WORKER_URL.`
        showError(msg)
        return
      }
      const data = await r.json()
      records = (data.records || []).filter(r => r.installId)
      applyFilter()
      renderStats()
      document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleTimeString()
    } catch (e) {
      showError('Network error: ' + e.message)
    } finally {
      document.getElementById('refresh').disabled = false
    }
  }

  function applyFilter() {
    const q = document.getElementById('q').value.trim().toLowerCase()
    if (!q) { filtered = records; }
    else {
      filtered = records.filter(r =>
        (r.installId && r.installId.toLowerCase().includes(q)) ||
        (r.osUser && r.osUser.toLowerCase().includes(q)) ||
        (r.friendlyName && r.friendlyName.toLowerCase().includes(q)) ||
        (r.city && r.city.toLowerCase().includes(q)) ||
        (r.country && r.country.toLowerCase().includes(q)) ||
        (r.version && r.version.toLowerCase().includes(q))
      )
    }
    renderList()
    renderMarkers()
  }

  function renderStats() {
    const now = Date.now()
    const active24 = records.filter(r => now - r.lastSeen < DAY).length
    const launches = records.reduce((s, r) => s + (r.launches || 0), 0)
    const countries = new Set(records.map(r => r.country).filter(Boolean)).size
    document.getElementById('stat-total').textContent = records.length
    document.getElementById('stat-active').textContent = active24
    document.getElementById('stat-launches').textContent = launches
    document.getElementById('stat-countries').textContent = countries
  }

  function renderList() {
    const list = document.getElementById('list')
    list.innerHTML = ''
    if (filtered.length === 0) {
      list.innerHTML = '<div style="padding:20px;color:var(--muted);text-align:center;font-size:13px">No installs yet. Once a client pings, it shows up here.</div>'
      return
    }
    for (const r of filtered) {
      const row = document.createElement('div')
      row.className = 'row' + (r.installId === selectedId ? ' active' : '')
      const bucket = bucketFor(r.lastSeen)
      const displayName = r.friendlyName || r.osUser || r.installId
      const nameIsUuid = displayName === r.installId
      row.innerHTML = `
        <div class="id"><span class="dot ${bucket}"></span>${nameIsUuid ? r.installId : `<strong style="color:var(--text)">${displayName}</strong>`}</div>
        ${!nameIsUuid ? `<div class="id" style="margin-top:3px;opacity:0.7">${r.installId}</div>` : ''}
        <div class="meta">
          <span>${r.city || '?'}${r.country ? ', ' + r.country : ''}</span>
          <span>v${r.version || '?'}</span>
          <span>${r.launches || 0}×</span>
          <span title="${new Date(r.lastSeen).toLocaleString()}">${fmtRelative(r.lastSeen)}</span>
        </div>
      `
      row.onclick = () => {
        selectedId = r.installId
        renderList()
        if (r.lat != null && r.lon != null) map.setView([r.lat, r.lon], 8, { animate: true })
      }
      list.appendChild(row)
    }
  }

  function renderMarkers() {
    if (!markerLayer) return
    markerLayer.clearLayers()
    for (const r of filtered) {
      if (r.lat == null || r.lon == null) continue
      const bucket = bucketFor(r.lastSeen)
      const color = bucket === 'ok' ? '#6ecf7b' : bucket === 'warn' ? '#f5c15e' : '#6b7078'
      const marker = L.circleMarker([r.lat, r.lon], {
        radius: 7,
        color: color,
        weight: 2,
        fillColor: color,
        fillOpacity: 0.5,
      })
      const geoLine = r.geoSource === 'gps'
        ? `GPS · ±${r.gpsAccuracy != null ? r.gpsAccuracy + 'm' : '?'}`
        : r.geoError
          ? `IP only · GPS failed: ${r.geoError}`
          : 'IP · ~metro'
      const headerName = r.friendlyName
        ? `<div style="font-weight:600;font-size:14px">${r.friendlyName}</div>`
        : r.osUser
          ? `<div style="font-weight:600;font-size:13px">${r.osUser} <span style="opacity:0.5;font-weight:400">(PC user)</span></div>`
          : ''
      marker.bindPopup(`
        <div class="popup">
          ${headerName}
          <div class="id-line">${r.installId}</div>
          <div><strong>${r.city || '?'}</strong>${r.country ? ', ' + r.country : ''}</div>
          <div style="color:#666;font-size:11px">${geoLine}</div>
          <div>v${r.version || '?'} · ${r.platform || '?'}</div>
          <div>${r.launches || 0} launches</div>
          <div>First: ${fmtRelative(r.firstSeen)}</div>
          <div>Last: ${fmtRelative(r.lastSeen)}</div>
          <button class="revoke" onclick="copyForRevoke('${r.installId}')">Copy ID for revocation</button>
        </div>
      `)
      marker.addTo(markerLayer)
    }
  }

  function copyForRevoke(id) {
    navigator.clipboard.writeText(id).then(() => {
      alert(`Install ID copied:\n\n${id}\n\nPaste into access.json → blocked[], commit + push, and the client will be blocked within minutes.`)
    }).catch(() => {
      prompt('Copy this ID manually and paste into access.json blocked[]:', id)
    })
  }
  // Expose for inline onclick in popup HTML
  window.copyForRevoke = copyForRevoke

  function initMap() {
    // World view centred roughly over Europe/Atlantic
    map = L.map('map', { zoomControl: true, attributionControl: true }).setView([35, 10], 3)
    // CartoDB "Dark Matter" tiles — dark theme matches the app UI, free,
    // no referer/usage restrictions (unlike OSM's volunteer tile server
    // which blocks file:// loads because they send no Referer). The
    // tilestream is served via a rotating subdomain pool (a/b/c/d) to
    // parallelise downloads.
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd',
      attribution: '© OpenStreetMap contributors © CARTO',
      maxZoom: 19,
    }).addTo(map)
    markerLayer = L.layerGroup().addTo(map)
  }

  document.addEventListener('DOMContentLoaded', () => {
    if (typeof L === 'undefined') {
      // Defer slightly — the Leaflet script is `defer`red, it might not
      // have finished parsing when DOMContentLoaded fires. In practice it
      // always has, but belt & braces.
      const t = setInterval(() => {
        if (typeof L !== 'undefined') { clearInterval(t); initMap(); fetchRecords() }
      }, 50)
    } else {
      initMap()
      fetchRecords()
    }
    document.getElementById('q').addEventListener('input', applyFilter)
    document.getElementById('refresh').addEventListener('click', fetchRecords)
    // Auto-refresh every 60s
    setInterval(fetchRecords, 60_000)
  })
</script>
</body>
</html>
